<svg xmlns="http://www.w3.org/2000/svg" width="560" height="280" viewBox="0 0 560 280">
  <rect width="560" height="280" fill="#0d1117"/>

  <g stroke="#161b22" stroke-width="2">
    <line x1="0" y1="70" x2="560" y2="70"/>
    <line x1="0" y1="140" x2="560" y2="140"/>
    <line x1="0" y1="210" x2="560" y2="210"/>
    <line x1="140" y1="0" x2="140" y2="280"/>
    <line x1="280" y1="0" x2="280" y2="280"/>
    <line x1="420" y1="0" x2="420" y2="280"/>
  </g>

  <circle cx="140" cy="140" r="4" fill="#00ffcc"/>
  <circle cx="420" cy="140" r="4" fill="#00ffcc"/>
  <line x1="140" y1="140" x2="420" y2="140" stroke="#00ffcc" stroke-width="1.5" stroke-dasharray="5,5"/>

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-eva">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <text x="50" y="165" font-family="monospace" font-size="80" fill="#1f6feb" opacity="0.2" font-weight="bold">{</text>
  <text x="470" y="165" font-family="monospace" font-size="80" fill="#1f6feb" opacity="0.2" font-weight="bold">}</text>

  <text x="280" y="115" font-family="monospace" font-size="56" font-weight="bold" fill="#00ffcc" text-anchor="middle" filter="url(#glow-eva)" letter-spacing="6">EVA</text>

  <text x="280" y="152" font-family="monospace" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)" letter-spacing="3">AGENT-EVOLUTION</text>

  <text x="280" y="180" font-family="sans-serif" font-size="12" fill="#8b949e" text-anchor="middle" letter-spacing="1.5">RECURSIVE AI CODER • VIBE CODING</text>

  <rect x="155" y="220" width="250" height="26" rx="4" fill="#1a2332" stroke="#00ffcc" stroke-width="1"/>
  <text x="280" y="238" font-family="sans-serif" font-size="11" fill="#00ffcc" text-anchor="middle" font-weight="bold" letter-spacing="1">KAGGLE AI AGENTS CAPSTONE</text>
</svg>
